name: 'Verify Agent Wallets'
description: 'Validate .agent/wallets.json against the Agent Wallet Manifest schema. Optionally submit to any compatible registry.'
author: 'Zetta AI'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  manifest-path:
    description: 'Path to the wallet manifest file'
    required: false
    default: '.agent/wallets.json'
  zetta-api-key:
    description: 'API key for submitting to the Zetta AI registry (optional — validation runs without it)'
    required: false
    default: ''
  registry-submit:
    description: 'Submit manifest to the Zetta AI registry after validation. Requires zetta-api-key.'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install validator
      shell: bash
      run: |
        git clone https://github.com/danbuildss/agent-wallet-manifest /tmp/avm --depth 1 --quiet
        cd /tmp/avm && npm ci --silent

    - name: Resolve manifest path
      shell: bash
      run: |
        MANIFEST="${{ inputs.manifest-path }}"
        if [ ! -f "$MANIFEST" ] && [ -f ".x402books/wallets.json" ]; then
          echo "MANIFEST_PATH=.x402books/wallets.json" >> $GITHUB_ENV
          echo "Note: using legacy path .x402books/wallets.json — consider migrating to .agent/wallets.json"
        else
          echo "MANIFEST_PATH=$MANIFEST" >> $GITHUB_ENV
        fi

    - name: Validate manifest
      shell: bash
      run: |
        echo "Validating $MANIFEST_PATH..."
        node /tmp/avm/dist/validate.js "$MANIFEST_PATH"
        echo "✓ Manifest valid"

    - name: Submit to Zetta registry
      if: inputs.registry-submit == 'true' && inputs.zetta-api-key != ''
      shell: bash
      run: |
        REPO="$GITHUB_REPOSITORY"
        echo "Submitting to Zetta AI registry..."
        curl -s --max-time 10 \
          -X POST "https://www.zettaai.co/api/registry/submit" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ inputs.zetta-api-key }}" \
          -d "{\"repo\": \"${REPO}\", \"manifest_path\": \"${MANIFEST_PATH}\"}" \
          --fail-with-body && echo "✓ Submitted to Zetta registry" \
          || echo "Registry submission queued — will index on next sync"

    - name: Print badge markdown
      shell: bash
      run: |
        SLUG=$(echo "$GITHUB_REPOSITORY" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
        BADGE_URL="https://www.zettaai.co/api/badge/${SLUG}.svg"
        REGISTRY_URL="https://www.zettaai.co/registry/${SLUG}"
        BADGE_MD="[![Agent Wallet Manifest](${BADGE_URL})](${REGISTRY_URL})"

        echo ""
        echo "══════════════════════════════════════════════════"
        echo "✅ Agent Wallet Manifest verified"
        echo ""
        echo "Add this badge to your README:"
        echo ""
        echo "  ${BADGE_MD}"
        echo ""
        echo "Validate online:  https://www.zettaai.co/validate"
        echo "══════════════════════════════════════════════════"

        if [ -n "$GITHUB_STEP_SUMMARY" ]; then
          echo "## ✅ Agent Wallet Manifest Verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`markdown" >> $GITHUB_STEP_SUMMARY
          echo "${BADGE_MD}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Validate online:** [zettaai.co/validate](https://www.zettaai.co/validate)" >> $GITHUB_STEP_SUMMARY
        fi
