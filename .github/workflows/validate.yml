name: Validate Wallet Manifest

on:
  push:
    paths:
      - ".agent/wallets.json"
  pull_request:
    paths:
      - ".agent/wallets.json"

jobs:
  validate:
    name: Validate wallets.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install agent-wallet-manifest validator
        run: |
          git clone https://github.com/danbuildss/agent-wallet-manifest /tmp/avm
          cd /tmp/avm && npm ci

      - name: Validate manifest
        run: node /tmp/avm/dist/validate.js .agent/wallets.json
